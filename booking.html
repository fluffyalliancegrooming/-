    /* --- FINAL HEADER STYLES --- */
    header { 
        background: #fff;
        padding: 15px 20px;
        border-bottom: 1px solid #ddd;
        
        /* 1. Set the header as a positioning context. This is crucial. */
        position: relative; 
        
        /* 2. Set a minimum height to ensure it looks good even if content is removed */

    /* Style for the logo image */

    }

    header h1 {
        margin: 0;
        font-size: 1.8em;
        
        /* 4. Take the title out of the normal flow */
        position: absolute;
        
        /* 5. The classic centering trick: */
        left: 50%; /* Move the element's left edge to the page's 50% mark */
        top: 50%;  /* Move the element's top edge to the header's 50% mark */
        transform: translate(-50%, -50%); /* Shift the element back by half its own width and height */

        /* 6. Prevent title from overlapping the logo on very small screens */
        max-width: calc(100% - 200px); /* 100% width minus space for the logo and right padding */
        text-align: center; /* Ensures text inside is centered if it wraps */
    }

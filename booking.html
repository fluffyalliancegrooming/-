    <style>
    /* General body styles */
    body { 
        font-family: 'Zen Maru Gothic', sans-serif; 
        line-height: 1.6; 
        margin: 0; 
        padding: 0; 
        background-color: #f4f4f4; 
        font-size: 30px;
    }
    
    /* --- FINAL HEADER STYLES --- */
    header { 
        background: #fff;
        padding: 15px 20px;
        border-bottom: 1px solid #ddd;
        
        /* 1. Set the header as a positioning context. This is crucial. */
        position: relative; 
        
        /* 2. Set a minimum height to ensure it looks good even if content is removed */
        min-height: 50px;

        /* 3. Use flex just to vertically align the logo if needed */
        display: flex;
        align-items: center;
    }
    
    /* Style for the logo image */
    .logo {
        /* The logo stays in the normal document flow, on the left */
        width: 80px;
        height: auto;
    }

    /* Style for the main title */
    header h1 {
        margin: 0;
        font-size: 1.8em;
        
        /* 4. Take the title out of the normal flow */
        position: absolute;
        
        /* 5. The classic centering trick: */
        left: 50%; /* Move the element's left edge to the page's 50% mark */
        top: 50%;  /* Move the element's top edge to the header's 50% mark */
        transform: translate(-50%, -50%); /* Shift the element back by half its own width and height */

        /* 6. Prevent title from overlapping the logo on very small screens */
        max-width: calc(100% - 200px); /* 100% width minus space for the logo and right padding */
        text-align: center; /* Ensures text inside is centered if it wraps */
    }
    /* --- END OF FINAL STYLES --- */

    nav { 
        display: flex; 
        justify-content: center; 
        background: #444; 
    }
    nav a { 
        color: white; 
        padding: 14px 20px; 
        text-decoration: none; 
        text-align: center; 
    }
    nav a:hover { 
        background-color: #555; 
    }
    .container { 
        padding: 20px; 
    }
    footer { 
        text-align: center; 
        padding: 20px; 
        margin-top: 40px; 
        background: #333; 
        color: #fff; 
    }
    footer img {
        height: 40px; /* Adjust this number to make them bigger or smaller */
        width: auto;  /* Maintains the aspect ratio */
        margin: 0 10px; /* Adds space between the two icons */
        vertical-align: middle; /* Aligns them with the text */
        transition: transform 0.2s; /* Optional: makes them pop when hovered */
}
</style>

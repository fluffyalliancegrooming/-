<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>優獸聯萌</title>
    <style>
        /* General body styles */
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #ddd; position: relative; min-height: 50px; display: flex; align-items: center; }
        .logo { width: 80px; height: auto; }
        header h1 { margin: 0; font-size: 1.8em; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); max-width: calc(100% - 200px); text-align: center; }
        nav { display: flex; justify-content: center; background: #444; }
        nav a { color: white; padding: 14px 20px; text-decoration: none; text-align: center; }
        nav a:hover { background-color: #555; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        footer { text-align: center; padding: 20px; margin-top: 40px; background: #333; color: #fff; }

        /* --- E-COMMERCE STYLES --- */
        .store-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #e9e9e9;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .category-filter label, .shopping-cart-button {
            font-weight: bold;
        }

        .category-filter select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-left: 10px;
        }

        .shopping-cart-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .shopping-cart-button:hover {
            background-color: #0056b3;
        }
        
        #product-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-item {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .product-item img {
            max-width: 100%;
            height: 180px;
            object-fit: cover;
            margin-bottom: 15px;
            transition: opacity 0.3s ease; /* NEW: Smooth image transition */
        }
        .product-item h3 { margin: 0 0 10px 0; }
        .product-item p { margin: 0 0 10px 0; color: #555; }
        .product-item .price { font-weight: bold; font-size: 1.2em; margin-bottom: 15px; min-height: 1.2em; }

        /* NEW: Styles for the variant dropdown */
        .variant-select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .add-to-cart-btn {
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: auto;
        }
        .add-to-cart-btn:hover {
            background-color: #218838;
        }

        /* Shopping Cart Modal Styles */
        #cart-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 700px;
            border-radius: 10px;
        }

        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        #cart-items-list { list-style: none; padding: 0; }
        #cart-items-list li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .cart-total { font-weight: bold; text-align: right; margin-top: 20px; font-size: 1.2em; }
        #inquiry-form { margin-top: 20px; }
        #inquiry-form button { display: block; width: 100%; padding: 15px; font-size: 1.1em; background-color: #17a2b8; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <header>
        <img src="web photo/paw.png" alt="Paws & Polish Pet Spa Logo" class="logo">
        <h1>Paws & Polish Pet Spa</h1>
    </header>

    <nav>
        <a href="index.html">主頁</a>
        <a href="booking.html">預訂</a>
        <a href="products.html">商品</a>
        <a href="contact.html">聯絡我們</a>
    </nav>

    <div class="container">
        <!-- Controls: Category Filter and Cart Button -->
        <div class="store-controls">
            <div class="category-filter">
                <label for="category-select">Filter by Category:</label>
                <select id="category-select"></select>
            </div>
            <button class="shopping-cart-button" id="view-cart-btn">Shopping Cart (<span id="cart-count">0</span>)</button>
        </div>

        <!-- Product Gallery -->
        <div id="product-gallery"></div>
    </div>

    <!-- Shopping Cart Modal -->
    <div id="cart-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal-btn">&times;</span>
            <h2>Your Order Inquiry</h2>
            <ul id="cart-items-list"></ul>
            <div class="cart-total" id="cart-total">Total: $0.00</div>
            <form id="inquiry-form" action="#" method="POST">
                <h3>Submit Your Order Inquiry</h3>
                <p>Click the button below to generate your order summary. You can then send it to us to arrange payment and delivery.</p>
                <input type="hidden" name="order_summary" id="order-summary-input">
                <button type="submit">Generate & Submit Inquiry</button>
            </form>
        </div>
    </div>

    <footer>
        <p>Copyright &copy; 2024 Paws & Polish Pet Spa</p>
    </footer>

    <script>
    // --- NEW: UPDATED DATABASE OF YOUR PRODUCTS ---
    const products = [
        // Product with NO variants
        { 
            id: 1, 
            name: 'Orabio Brush', 
            category: 'Orabio', 
            variants: [
                { sku: 'OB001', color: '短毛 (橙色)', price: 44.00, image:'web photo/8ee9d8484fd1ef2383d6494b4b48a38a.jpg' },
                { sku: 'OB002', color: '中毛 (綠色)', price: 44.00, image:'web photo/6782bfdfb80c8be4e655c27d1bb138d1.jpg'},
                { sku: 'OB003', color: '長毛(粉紅色)', price: 44.00, image:'web photo/727f864c3fc85cd43a698e1d22f07ad7.jpg'},
                { sku: 'OB004', color: '大號(藍色)', price: 44.00, image:'web photo/7127a9cae0350dd10403ccbaad71ba77.jpg'},
                { sku: 'OB005', color: '大號(米色)', price: 44.00, image:'web photo/3fccf83b28d393a4ed1b28a52dfa8fb8.jpg'},
                { sku: 'OB006', color: '迷你(薰衣草套裝)', price: 82.00, image:'web photo/8967c019748186930a726208165bf8da.jpg'},
                { sku: 'OB007', color: '迷你(玫瑰套裝)', price: 82.00, image:'web photo/104cf200f602c0ced3e24926e2fe1e0e.jpg'},
                { sku: 'OB008', color: '幼犬', price: 50.00, image:'web photo/18005fc0338b2a7b09cd37de880a7cc1.jpg'},
                { sku: 'OB009', color: '貓咪', price: 50.00, image:'web photo/6337c81d82a76768f98ff3599d859569.jpg'},
                { sku: 'OB010', color: '專業(10X)', price: 53.00, image:'web photo/f4db37959d3ec1e5757d4dfe437986b8.jpg'}
                
            ]
        },
        // Product WITH variants
        { 
            id: 8, 
            name: 'Reflective Collar', 
            category: 'Accessories', 
            variants: [
                { sku: 'COLLAR-RED', color: 'Red', price: 16.00, image: 'https://via.placeholder.com/200/FF0000/FFFFFF?Text=Red+Collar' },
                { sku: 'COLLAR-BLU', color: 'Blue', price: 16.00, image: 'https://via.placeholder.com/200/0000FF/FFFFFF?Text=Blue+Collar' },
                { sku: 'COLLAR-BLK', color: 'Black', price: 17.50, image: 'https://via.placeholder.com/200/000000/FFFFFF?Text=Black+Collar' } // Example of different price
            ]
        },
        // More examples
        { id: 2, name: 'Durable Chew Toy', category: 'Toys', variants: [{ sku: 'TOY001', color: 'Default', price: 12.00, image: 'https://via.placeholder.com/200/ADD8E6/000000?Text=Toy' }] },
        { id: 3, name: 'Soft Bristle Brush', category: 'Grooming', variants: [{ sku: 'BRSH001', color: 'Default', price: 18.00, image: 'https://via.placeholder.com/200/90EE90/000000?Text=Brush' }] },
        { id: 4, name: 'Adjustable Nylon Leash', category: 'Accessories', variants: [{ sku: 'LEASH001', color: 'Default', price: 22.50, image: 'https://via.placeholder.com/200/FFA07A/000000?Text=Leash' }] },
        { id: 5, name: 'Premium Dog Food (5kg)', category: 'Food', variants: [{ sku: 'FOOD001', color: 'Default', price: 45.00, image: 'https://via.placeholder.com/200/DA70D6/000000?Text=Food' }] },
        { id: 6, name: 'Squeaky Ball Pack', category: 'Toys', variants: [{ sku: 'BALL001', color: 'Default', price: 8.50, image: 'https://via.placeholder.com/200/87CEFA/000000?Text=Balls' }] },
        { id: 7, name: 'Soothing Paw Balm', category: 'Grooming', variants: [{ sku: 'BALM001', color: 'Default', price: 14.00, image: 'https://via.placeholder.com/200/F0E68C/000000?Text=Balm' }] }
    ];

    // --- JAVASCRIPT LOGIC ---
    document.addEventListener('DOMContentLoaded', () => {
        const productGallery = document.getElementById('product-gallery');
        const categorySelect = document.getElementById('category-select');
        const cartCountSpan = document.getElementById('cart-count');
        const viewCartBtn = document.getElementById('view-cart-btn');
        const cartModal = document.getElementById('cart-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const cartItemsList = document.getElementById('cart-items-list');
        const cartTotalSpan = document.getElementById('cart-total');
        const inquiryForm = document.getElementById('inquiry-form');
        const orderSummaryInput = document.getElementById('order-summary-input');
        
        let cart = [];

        // --- UPDATED: renderProducts Function ---
        function renderProducts(filter = 'all') {
            productGallery.innerHTML = '';
            const filteredProducts = (filter === 'all') ? products : products.filter(p => p.category === filter);

            filteredProducts.forEach(product => {
                const item = document.createElement('div');
                item.className = 'product-item';
                // Use a unique ID for each product card for easier selection
                item.id = `product-${product.id}`; 
                
                let variantSelectorHTML = '';
                if (product.variants.length > 1) {
                    variantSelectorHTML = `
                        <select class="variant-select" data-product-id="${product.id}">
                            ${product.variants.map(v => `<option value="${v.sku}">${v.color}</option>`).join('')}
                        </select>
                    `;
                }

                item.innerHTML = `
                    <img src="${product.variants[0].image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    ${variantSelectorHTML}
                    <div class="price">$${product.variants[0].price.toFixed(2)}</div>
                    <button class="add-to-cart-btn" data-product-id="${product.id}">Add to Cart</button>
                `;
                productGallery.appendChild(item);
            });
        }
        
        // --- NEW: Function to handle variant changes ---
        function handleVariantChange(e) {
            const selectElement = e.target;
            const productId = parseInt(selectElement.dataset.productId);
            const selectedSku = selectElement.value;
            
            const product = products.find(p => p.id === productId);
            const selectedVariant = product.variants.find(v => v.sku === selectedSku);
            
            const productCard = document.getElementById(`product-${productId}`);
            productCard.querySelector('img').src = selectedVariant.image;
            productCard.querySelector('.price').textContent = `$${selectedVariant.price.toFixed(2)}`;
        }

        function populateCategories() {
            const categories = ['all', ...new Set(products.map(p => p.category))];
            categorySelect.innerHTML = '';
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category.charAt(0).toUpperCase() + category.slice(1);
                categorySelect.appendChild(option);
            });
        }
        
        function updateCartCount() {
            cartCountSpan.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
        }

        // --- UPDATED: addToCart Function ---
        function addToCart(productId) {
            const productCard = document.getElementById(`product-${productId}`);
            const selectElement = productCard.querySelector('.variant-select');
            
            // Determine the selected SKU. If no dropdown, use the first variant's SKU.
            const selectedSku = selectElement ? selectElement.value : products.find(p => p.id === productId).variants[0].sku;
            
            const cartItem = cart.find(item => item.sku === selectedSku);

            if (cartItem) {
                cartItem.quantity++;
            } else {
                const product = products.find(p => p.id === productId);
                const variant = product.variants.find(v => v.sku === selectedSku);
                cart.push({ 
                    id: product.id, 
                    sku: variant.sku,
                    // Store the full name with variant for the cart display
                    name: product.variants.length > 1 ? `${product.name} - ${variant.color}` : product.name,
                    price: variant.price,
                    quantity: 1 
                });
            }
            updateCartCount();
        }

        function renderCart() {
            cartItemsList.innerHTML = '';
            let total = 0;
            if (cart.length === 0) {
                cartItemsList.innerHTML = '<li>Your cart is empty.</li>';
            } else {
                cart.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${item.name} (x${item.quantity})</span>
                        <span>$${(item.price * item.quantity).toFixed(2)}</span>
                    `;
                    cartItemsList.appendChild(li);
                    total += item.price * item.quantity;
                });
            }
            cartTotalSpan.textContent = `Total: $${total.toFixed(2)}`;
        }
        
        function generateOrderSummary() {
            let summary = `New Order Inquiry:\n\n`;
            let total = 0;
            cart.forEach(item => {
                summary += `${item.name} (x${item.quantity}) - $${(item.price * item.quantity).toFixed(2)}\n`;
                total += item.price * item.quantity;
            });
            summary += `\nTotal: $${total.toFixed(2)}`;
            return summary;
        }

        // --- Event Listeners ---
        categorySelect.addEventListener('change', () => {
            renderProducts(categorySelect.value);
        });
        
        // --- UPDATED: Event listener for the whole gallery ---
        productGallery.addEventListener('click', (e) => {
            if (e.target.classList.contains('add-to-cart-btn')) {
                const productId = parseInt(e.target.dataset.productId);
                addToCart(productId);
            }
        });
        
        // NEW: Event listener for variant dropdowns
        productGallery.addEventListener('change', (e) => {
            if (e.target.classList.contains('variant-select')) {
                handleVariantChange(e);
            }
        });

        viewCartBtn.addEventListener('click', () => {
            renderCart();
            cartModal.style.display = 'block';
        });
        closeModalBtn.addEventListener('click', () => { cartModal.style.display = 'none'; });
        window.addEventListener('click', (e) => { if (e.target === cartModal) { cartModal.style.display = 'none'; } });
        inquiryForm.addEventListener('submit', () => { orderSummaryInput.value = generateOrderSummary(); });

        // --- Initial Load ---
        populateCategories();
        renderProducts();
    });
    </script>
</body>
</html>

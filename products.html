    <style>

        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #ddd; position: relative; min-height: 50px; display: flex; align-items: center; }
        .logo { width: 80px; height: auto; }
        header h1 { margin: 0; font-size: 1.8em; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); max-width: calc(100% - 200px); text-align: center; }
        nav { display: flex; justify-content: center; background: #444; }
        nav a { color: white; padding: 14px 20px; text-decoration: none; text-align: center; }
        nav a:hover { background-color: #555; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        footer { text-align: center; padding: 20px; margin-top: 40px; background: #333; color: #fff; }

        /* --- E-COMMERCE STYLES --- */
        .store-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #e9e9e9;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .category-filter label, .shopping-cart-button {
            font-weight: bold;
        }

        .category-filter select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-left: 10px;
        }

        .shopping-cart-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .shopping-cart-button:hover {
            background-color: #0056b3;
        }
        
        #product-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-item {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .product-item img {
            max-width: 100%;
            height: 180px;
            object-fit: cover;
            margin-bottom: 15px;
            transition: opacity 0.3s ease; /* NEW: Smooth image transition */
        }
        .product-item h3 { margin: 0 0 10px 0; }
        .product-item p { margin: 0 0 10px 0; color: #555; }
        .product-item .price { font-weight: bold; font-size: 1.2em; margin-bottom: 15px; min-height: 1.2em; }
        .variant-options { margin-bottom: 15px; }
        .variant-select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; margin-top: 5px; }

        .add-to-cart-btn { padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: auto; }
        .add-to-cart-btn:hover { background-color: #218838; }
        /* NEW: Styles for the variant dropdown */
        .variant-select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .add-to-cart-btn {
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: auto;
        }
        .add-to-cart-btn:hover {
            background-color: #218838;
        }

        /* Shopping Cart Modal Styles */
        #cart-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 700px;
            border-radius: 10px;
        }

        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        #cart-items-list { list-style: none; padding: 0; }
        #cart-items-list li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .cart-total { font-weight: bold; text-align: right; margin-top: 20px; font-size: 1.2em; }
        #inquiry-form { margin-top: 20px; }
        #inquiry-form button { display: block; width: 100%; padding: 15px; font-size: 1.1em; background-color: #17a2b8; color: white; border: none; cursor: pointer; border-radius: 5px; }

    // --- JAVASCRIPT LOGIC ---
    document.addEventListener('DOMContentLoaded', () => {
        const productGallery = document.getElementById('product-gallery');
        const categorySelect = document.getElementById('category-select');
        const cartCountSpan = document.getElementById('cart-count');
        const viewCartBtn = document.getElementById('view-cart-btn');
        const cartModal = document.getElementById('cart-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const cartItemsList = document.getElementById('cart-items-list');
        const cartTotalSpan = document.getElementById('cart-total');
        const inquiryForm = document.getElementById('inquiry-form');
        const orderSummaryInput = document.getElementById('order-summary-input');
        
        let cart = [];

        // --- UPDATED: renderProducts Function ---
        function renderProducts(filter = 'all') {
            productGallery.innerHTML = '';
            const filteredProducts = (filter === 'all') ? products : products.filter(p => p.category === filter);

            filteredProducts.forEach(product => {
                const item = document.createElement('div');
                item.className = 'product-item';
                item.id = `product-${product.id}`;
                
                const options = {};
                product.variants.forEach(v => {
                    Object.keys(v).forEach(key => {
                        if (key !== 'sku' && key !== 'price' && key !== 'image') {
                            if (!options[key]) options[key] = new Set();
                            options[key].add(v[key]);
                        }
                    });
                });

                let variantSelectorsHTML = '<div class="variant-options">';
                const optionKeys = Object.keys(options); // Get the list of option types (e.g., ['size', 'flavor'])

                optionKeys.forEach(optionName => {
                    if (options[optionName].size > 1 || !options[optionName].has('Default')) {
                        const capitalizedOptionName = optionName.charAt(0).toUpperCase() + optionName.slice(1);
                        
                        let labelHTML = '';
                        // --- THIS IS THE KEY CHANGE ---
                        // Only show the label if there are multiple option types (like size AND flavor),
                        // OR if the single option type is NOT 'color'.
                        if (optionKeys.length > 1 || optionName !== 'color') {
                            labelHTML = `<label for="select-${product.id}-${optionName}">${capitalizedOptionName}:</label>`;
                        }
                        // --- END OF KEY CHANGE ---
                        
                        variantSelectorsHTML += `
                            ${labelHTML}
                            <select class="variant-select" data-product-id="${product.id}" data-option-name="${optionName}">
                                ${Array.from(options[optionName]).map(value => `<option value="${value}">${value}</option>`).join('')}
                            </select>
                        `;
                    }
                });
                variantSelectorsHTML += '</div>';
                
                if (Object.keys(options).length === 0 || variantSelectorsHTML.includes('<select') === false) {
                    variantSelectorsHTML = '';
                }

                item.innerHTML = `
                    <img src="${product.variants[0].image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    ${variantSelectorsHTML}
                    <div class="price">$${product.variants[0].price.toFixed(2)}</div>
                    <button class="add-to-cart-btn" data-product-id="${product.id}">Add to Cart</button>
                `;
                productGallery.appendChild(item);
            });
        }
        
        // --- NEW: Function to handle variant changes ---
        function handleVariantChange(e) {
            const selectElement = e.target;
            const productId = parseInt(selectElement.dataset.productId);
            const productCard = document.getElementById(`product-${productId}`);
            
            // Get current selections from ALL dropdowns for this product
            const selections = {};
            productCard.querySelectorAll('.variant-select').forEach(sel => {
                selections[sel.dataset.optionName] = sel.value;
            });
            
            const product = products.find(p => p.id === productId);
            // Find the variant that matches ALL selected options
            const selectedVariant = product.variants.find(v => {
                return Object.keys(selections).every(key => v[key] === selections[key]);
            });

            // Update image and price only if a valid combination is found
            if (selectedVariant) {
                productCard.querySelector('img').src = selectedVariant.image;
                productCard.querySelector('.price').textContent = `$${selectedVariant.price.toFixed(2)}`;
            }
        }

        function populateCategories() {
            const categories = ['all', ...new Set(products.map(p => p.category))];
            categorySelect.innerHTML = '';
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category.charAt(0).toUpperCase() + category.slice(1);
                categorySelect.appendChild(option);
            });
        }
        
        function updateCartCount() {
            cartCountSpan.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
        }

        
        function addToCart(productId) {
            const productCard = document.getElementById(`product-${productId}`);
            const product = products.find(p => p.id === productId);

            let selectedVariant;
            const selections = {};
            const dropdowns = productCard.querySelectorAll('.variant-select');

            if (dropdowns.length > 0) {
                 dropdowns.forEach(sel => {
                    selections[sel.dataset.optionName] = sel.value;
                });
                selectedVariant = product.variants.find(v => {
                    return Object.keys(selections).every(key => v[key] === selections[key]);
                });
            } else {
                // If no dropdowns, it's a simple product
                selectedVariant = product.variants[0];
            }

            if (!selectedVariant) {
                alert("This combination is not available.");
                return;
            }

            const cartItem = cart.find(item => item.sku === selectedVariant.sku);

            if (cartItem) {
                cartItem.quantity++;
            } else {
                let name = product.name;
                // Build a descriptive name, e.g., "Gourmet Pet Treats (100g, Chicken)"
                const nameParts = Object.values(selections);
                if(nameParts.length > 0) {
                    name += ` (${nameParts.join(', ')})`;
                }

                cart.push({ 
                    sku: selectedVariant.sku,
                    name: name,
                    price: selectedVariant.price,
                    quantity: 1 
                });
            }
            updateCartCount();
        }

        function renderCart() {
            cartItemsList.innerHTML = '';
            let total = 0;
            if (cart.length === 0) {
                cartItemsList.innerHTML = '<li>Your cart is empty.</li>';
            } else {
                cart.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${item.name} (x${item.quantity})</span>
                        <span>$${(item.price * item.quantity).toFixed(2)}</span>
                    `;
                    cartItemsList.appendChild(li);
                    total += item.price * item.quantity;
                });
            }
            cartTotalSpan.textContent = `Total: $${total.toFixed(2)}`;
        }
        
        function generateOrderSummary() {
            let summary = `New Order Inquiry:\n\n`;
            let total = 0;
            cart.forEach(item => {
                summary += `${item.name} (x${item.quantity}) - $${(item.price * item.quantity).toFixed(2)}\n`;
                total += item.price * item.quantity;
            });
            summary += `\nTotal: $${total.toFixed(2)}`;
            return summary;
        }

        // --- Event Listeners ---
        categorySelect.addEventListener('change', () => {
            renderProducts(categorySelect.value);
        });
        
        // --- UPDATED: Event listener for the whole gallery ---
        productGallery.addEventListener('click', (e) => {
            if (e.target.classList.contains('add-to-cart-btn')) {
                const productId = parseInt(e.target.dataset.productId);
                addToCart(productId);
            }
        });
        
        // NEW: Event listener for variant dropdowns
        productGallery.addEventListener('change', (e) => {
            if (e.target.classList.contains('variant-select')) {
                handleVariantChange(e);
            }
        });

        viewCartBtn.addEventListener('click', () => {
            renderCart();
            cartModal.style.display = 'block';
        });
        closeModalBtn.addEventListener('click', () => { cartModal.style.display = 'none'; });
        window.addEventListener('click', (e) => { if (e.target === cartModal) { cartModal.style.display = 'none'; } });
        inquiryForm.addEventListener('submit', () => { orderSummaryInput.value = generateOrderSummary(); });

        // --- Initial Load ---
        populateCategories();
        renderProducts();
    });
    </script>

    <style>
        /* General body styles (consistent with other pages) */
        body { font-family: 'Zen Maru Gothic', sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #ddd; position: relative; min-height: 50px; display: flex; align-items: center; }
        .logo { width: 80px; height: auto; }
        header h1 { margin: 0; font-size: 1.8em; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); max-width: calc(100% - 200px); text-align: center; }
        nav { display: flex; justify-content: center; background: #444; }
        nav a { color: white; padding: 14px 20px; text-decoration: none; text-align: center; }
        nav a:hover { background-color: #555; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        footer { text-align: center; padding: 20px; margin-top: 40px; background: #333; color: #fff; }

        /* --- NEW STYLES FOR THE PHOTO GALLERY --- */
        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .gallery-controls {
            display: flex;
            justify-content: flex-start; /* Aligns filter to the left */
            align-items: center;
            padding: 10px;
            background-color: #e9e9e9;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .gallery-category-filter label {
            font-weight: bold;
        }

        .gallery-category-filter select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-left: 10px;
        }
        .photo-gallery {
            display: grid;
            /* Creates a responsive grid that makes columns at least 300px wide */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px; /* Space between photos */
        }

        .photo-item {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            /* --- THIS IS THE ANIMATION MAGIC --- */
            transition: all 0.5s ease-in-out; /* Animate ALL properties */
            opacity: 1;
            transform: scale(1);
            height: 250px; /* Give it a fixed height */
        }
        
        /* --- THIS IS THE KEY CHANGE FOR REARRANGEMENT --- */
        .photo-item.hidden {
            opacity: 0;
            transform: scale(0); /* Scale down to nothing */
            height: 0; /* Animate height to 0 */
            padding: 0;
            margin: 0;
            border-width: 0;
        }

        .photo-item img {
            width: 100%;
            height: 250px; /* Fixed height for a uniform look */
            object-fit: cover; /* Ensures the image covers the area without distortion */
            display: block;
        }

        .photo-item figcaption {
            padding: 15px;
            font-style: italic;
            color: #555;
            text-align: center;
        }
        /* --- END OF NEW STYLES --- */
    </style>

        document.addEventListener('DOMContentLoaded', () => {
        const photoGallery = document.getElementById('photo-gallery');
        const categorySelect = document.getElementById('gallery-category-select');

        // Function to build the initial gallery ONCE.
        function buildInitialGallery() {
            galleryPhotos.forEach(photo => {
                // The figure tag is no longer needed since there's no caption. 
                // We can use a simpler div or just the img itself, but figure is fine.
                const figure = document.createElement('figure');
                figure.className = 'photo-item';
                figure.dataset.category = photo.category; 
                
                // The innerHTML now ONLY contains the image tag.
                figure.innerHTML = `<img src="${photo.src}" alt="${photo.category}">`;
                
                photoGallery.appendChild(figure);
            });
        }
        
        // Function to apply the filter by adding/removing CSS classes
        function applyFilter(filter) {
            const allPhotos = photoGallery.querySelectorAll('.photo-item');
            allPhotos.forEach(photo => {
                const photoCategory = photo.dataset.category;
                if (filter === 'all' || photoCategory === filter) {
                    photo.classList.remove('hidden');
                } else {
                    photo.classList.add('hidden');
                }
            });
        }

        // Function to find unique categories and create the dropdown
        function populateGalleryCategories() {
            const categories = ['all', ...new Set(galleryPhotos.map(photo => photo.category))];
            categorySelect.innerHTML = '';
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category === 'all' ? 'All' : category;
                categorySelect.appendChild(option);
            });
        }

        // --- Event Listener ---
        categorySelect.addEventListener('change', () => {
            applyFilter(categorySelect.value);
        });

        // --- Initial Page Load ---
        buildInitialGallery();
        populateGalleryCategories();
    });

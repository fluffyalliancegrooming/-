    <style>
        /* General body styles (consistent with other pages) */
        body { font-family: 'Zen Maru Gothic', sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #ddd; position: relative; min-height: 50px; display: flex; align-items: center; }
        .logo { width: 80px; height: auto; }
        header h1 { margin: 0; font-size: 1.8em; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); max-width: calc(100% - 200px); text-align: center; }
        nav { display: flex; justify-content: center; background: #444; }
        nav a { color: white; padding: 14px 20px; text-decoration: none; text-align: center; }
        nav a:hover { background-color: #555; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        footer { text-align: center; padding: 20px; margin-top: 40px; background: #333; color: #fff; }

        /* --- NEW STYLES FOR THE PHOTO GALLERY --- */
        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .photo-gallery {
            display: grid;
            /* Creates a responsive grid that makes columns at least 300px wide */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px; /* Space between photos */
        }

        .photo-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden; /* Ensures the image stays within the rounded corners */
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .photo-item img {
            width: 100%;
            height: 250px; /* Fixed height for a uniform look */
            object-fit: cover; /* Ensures the image covers the area without distortion */
            display: block;
        }

        .photo-item figcaption {
            padding: 15px;
            font-style: italic;
            color: #555;
            text-align: center;
        }
        /* --- END OF NEW STYLES --- */
    </style>
</head>

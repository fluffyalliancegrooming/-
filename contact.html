<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Paws & Polish Pet Spa</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #333; color: #fff; padding: 1rem 0; text-align: center; }
        nav { display: flex; justify-content: center; background: #444; }
        nav a { color: white; padding: 14px 20px; text-decoration: none; text-align: center; }
        nav a:hover { background-color: #555; }
        .container { padding: 20px; }
        .contact-form { max-width: 600px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 5px; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .contact-form button { width: 100%; padding: 10px; background: #333; color: #fff; border: none; cursor: pointer; }
        .form-warning { text-align:center; color: red; font-weight: bold; padding: 10px; background: #ffebeb; border: 1px solid red; border-radius: 5px; }
        footer { text-align: center; padding: 20px; margin-top: 40px; background: #333; color: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>Get In Touch</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="booking.html">Booking</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <div class="container">
        <div class="contact-form">
            <h2>Send Us a Message</h2>
            
            <div class="form-warning">
                This contact form is not yet functional. Please follow the instructions at the bottom of this file to activate it.
            </div>
            
            <!--
                INSTRUCTIONS TO MAKE THIS FORM WORK:
                1. Go to https://formspree.io/ and create a free account.
                2. Create a new form and Formspree will give you a URL, something like "https://formspree.io/f/your_unique_id".
                3. Replace the "#" in the action attribute below with your unique Formspree URL.
            -->
            <form action="#" method="POST">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <p>Copyright &copy; 2024 Paws & Polish Pet Spa</p>
    </footer>

</body>
</html>

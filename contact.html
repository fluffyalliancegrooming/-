<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>優獸聯萌</title>
    <style>
    /* General body styles */
    body { 
        font-family: sans-serif; 
        line-height: 1.6; 
        margin: 0; 
        padding: 0; 
        background-color: #f4f4f4; 
    }
    
    /* --- FINAL HEADER STYLES --- */
    header { 
        background: #fff;
        padding: 15px 20px;
        border-bottom: 1px solid #ddd;
        
        /* 1. Set the header as a positioning context. This is crucial. */
        position: relative; 
        
        /* 2. Set a minimum height to ensure it looks good even if content is removed */
        min-height: 50px;

        /* 3. Use flex just to vertically align the logo if needed */
        display: flex;
        align-items: center;
    }
    
    /* Style for the logo image */
    .logo {
        /* The logo stays in the normal document flow, on the left */
        width: 80px;
        height: auto;
    }

    /* Style for the main title */
    header h1 {
        margin: 0;
        font-size: 1.8em;
        
        /* 4. Take the title out of the normal flow */
        position: absolute;
        
        /* 5. The classic centering trick: */
        left: 50%; /* Move the element's left edge to the page's 50% mark */
        top: 50%;  /* Move the element's top edge to the header's 50% mark */
        transform: translate(-50%, -50%); /* Shift the element back by half its own width and height */

        /* 6. Prevent title from overlapping the logo on very small screens */
        max-width: calc(100% - 200px); /* 100% width minus space for the logo and right padding */
        text-align: center; /* Ensures text inside is centered if it wraps */
    }
    /* --- END OF FINAL STYLES --- */

    nav { 
        display: flex; 
        justify-content: center; 
        background: #444; 
    }
    nav a { 
        color: white; 
        padding: 14px 20px; 
        text-decoration: none; 
        text-align: center; 
    }
    nav a:hover { 
        background-color: #555; 
    }
    .container { 
        padding: 20px; 
    }
    footer { 
        text-align: center; 
        padding: 20px; 
        margin-top: 40px; 
        background: #333; 
        color: #fff; 
    }
</style>

</head>
<body>

    <header>
        <h1>Get In Touch</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="booking.html">Booking</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <div class="container">
        <div class="contact-form">
            <h2>Send Us a Message</h2>
            
            <div class="form-warning">
                This contact form is not yet functional. Please follow the instructions at the bottom of this file to activate it.
            </div>
            
            <!--
                INSTRUCTIONS TO MAKE THIS FORM WORK:
                1. Go to https://formspree.io/ and create a free account.
                2. Create a new form and Formspree will give you a URL, something like "https://formspree.io/f/your_unique_id".
                3. Replace the "#" in the action attribute below with your unique Formspree URL.
            -->
            <form action="#" method="POST">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <p>Copyright &copy; 2024 Paws & Polish Pet Spa</p>
    </footer>

</body>
</html>
